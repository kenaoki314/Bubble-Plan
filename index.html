              if (ox <= 0 || oy <= 0) continue;
              any = true;
              if (ox < oy) {
                const s = A.x + A.w / 2 <= B.x + B.w / 2 ? 1 : -1;
                zs[i].x = clamp(zs[i].x - (s * ox) / 2, 0, CANVAS.width - A.w);
                zs[j].x = clamp(zs[j].x + (s * ox) / 2, 0, CANVAS.width - B.w);
              } else {
                const s = A.y + A.h / 2 <= B.y + B.h / 2 ? 1 : -1;
                zs[i].y = clamp(zs[i].y - (s * oy) / 2, 0, CANVAS.height - A.h);
                zs[j].y = clamp(zs[j].y + (s * oy) / 2, 0, CANVAS.height - B.h);
              }
            }
          }
          if (!any) break;
        }
        const shift = {};
        zs.forEach((z, i) => {
          const dx = z.x - home[i].x, dy = z.y - home[i].y;
          if (dx || dy) { shift[z.id] = { dx, dy }; changed = true; }
        });
        if (!changed) return d;
        const tasks = Object.keys(shift).length
          ? d.tasks.map((t) => {
              const s = t.zoneId && shift[t.zoneId];
              return s ? { ...t, x: clamp(t.x + s.dx, 0, CANVAS.width - 420), y: clamp(t.y + s.dy, 0, CANVAS.height - 240) } : t;
            })
          : d.tasks;
        return { ...d, zones: zs, tasks };
      };

      /* ---- task ops ---- */
      const addTask = (fields, zoneId) => {
        const cardH = measureHeights();
        const c = viewCenter();
        const jitter = () => (Math.random() - 0.5) * 240;
        setData((d) => {
          const z = zoneId ? d.zones.find((zz) => zz.id === zoneId) : null;
          let x, y;
          if (z) {
            // stack under the zone's current tasks — fitZones grows the box
            const m = d.tasks.filter((t) => !t.completed && t.zoneId === z.id);
            x = z.x + ZONE_PAD;
            y = m.length ? Math.max(...m.map((t) => t.y + (cardH[t.id] || 220))) + 45 : z.y + ZONE_HEADER + 20;
          } else {
            x = c.x - 180 + jitter();
            y = c.y - 90 + jitter();
          }
          const t = {
            id: uid(), ...fields,
            x: clamp(x, 0, CANVAS.width - 420),
            y: clamp(y, 0, CANVAS.height - 240),
            completed: false, pomodoros: 0, subtasks: [], createdAt: Date.now(),
          };
          t.zoneId = z ? z.id : zoneIdAt(t, d.zones);
          return fitZones({ ...d, tasks: [...d.tasks, t] }, cardH);
        });
      };

      const moveTask = useCallback((id, x, y) => {
        setData((d) => ({ ...d, tasks: d.tasks.map((t) => (t.id === id ? { ...t, x, y } : t)) }));
      }, []);

      // A drag ended: the card keeps the zone it was dropped into (or none),
      // and every zone re-fits around its members.
      const dropTask = useCallback((id) => {
        const cardH = measureHeights();
        setData((d) => fitZones({
          ...d,
          tasks: d.tasks.map((t) => (t.id === id ? { ...t, zoneId: zoneIdAt(t, d.zones) } : t)),
        }, cardH));
      }, []);

      const updateTask = useCallback((id, fn) => {
        setData((d) => ({ ...d, tasks: d.tasks.map((t) => (t.id === id ? fn(t) : t)) }));
      }, []);

      const completeTask = (id) => {
        const cardH = measureHeights();
        setData((d) => fitZones({
          ...d,
          tasks: d.tasks.map((t) => (t.id === id ? { ...t, completed: true, completedAt: Date.now() } : t)),
          history: [...d.history, { t: Date.now(), title: d.tasks.find((t) => t.id === id)?.title || "" }].slice(-500),
          timer: d.timer?.taskId === id ? null : d.timer,
        }, cardH));
      };

      const restoreTask = (id) => {
        const cardH = measureHeights();
        setData((d) => fitZones({ ...d, tasks: d.tasks.map((t) => (t.id === id ? { ...t, completed: false } : t)) }, cardH));
      };
      const deleteTask = (id) => {
        const cardH = measureHeights();
        setData((d) => fitZones({
          ...d,
          tasks: d.tasks.filter((t) => t.id !== id),
          links: d.links.filter((l) => l.from !== id && l.to !== id),
          timer: d.timer?.taskId === id ? null : d.timer,
        }, cardH));
      };
      const clearDone = () => setData((d) => ({ ...d, tasks: d.tasks.filter((t) => !t.completed) }));

      /* ---- links ---- */
      const pickForLink = (taskId) => {
        if (linkStep === "from") { setLinkStep(taskId); return; }
        if (linkStep && linkStep !== "from") {
          if (taskId !== linkStep && !data.links.some((l) => l.from === linkStep && l.to === taskId)) {
            setData((d) => ({ ...d, links: [...d.links, { id: uid(), from: linkStep, to: taskId }] }));
          }
          setLinkStep(null);
        }
      };
      const deleteLink = (id) => setData((d) => ({ ...d, links: d.links.filter((l) => l.id !== id) }));

      /* ---- zones ---- */
      // `at` (canvas point) places the zone near the cursor (Z hotkey);
      // without it — e.g. the header button — the view center is used.
      const addZone = (at) => {
        const c = at ? { x: clamp(at.x, 0, CANVAS.width), y: clamp(at.y, 0, CANVAS.height) } : viewCenter();
        setData((d) => {
          // new zone lands at the nearest overlap-free spot to the view center
          const eff = (z) => ({ x: z.x, y: z.y, w: z.collapsed ? 360 : z.w, h: z.collapsed ? 110 : z.h });
          const free = (x, y) => !d.zones.some((z) => {
            const r = eff(z);
            return x < r.x + r.w + ZONE_GAP && r.x < x + ZONE_MIN.w + ZONE_GAP && y < r.y + r.h + ZONE_GAP && r.y < y + ZONE_MIN.h + ZONE_GAP;
          });
          let x = clamp(c.x - ZONE_MIN.w / 2, 0, CANVAS.width - ZONE_MIN.w);
          let y = clamp(c.y - ZONE_MIN.h / 2, 0, CANVAS.height - ZONE_MIN.h);
          if (!free(x, y)) {
            search: for (let r = 180; r < 9000; r += 150) {
              const steps = Math.max(8, Math.floor(r / 90));
              for (let s = 0; s < steps; s++) {
                const a = (2 * Math.PI * s) / steps;
                const nx = clamp(c.x + r * Math.cos(a) - ZONE_MIN.w / 2, 0, CANVAS.width - ZONE_MIN.w);
                const ny = clamp(c.y + r * Math.sin(a) * 0.85 - ZONE_MIN.h / 2, 0, CANVAS.height - ZONE_MIN.h);
                if (free(nx, ny)) { x = nx; y = ny; break search; }
              }
            }
          }
          return {
            ...d,
            zones: [...d.zones, {
              id: uid(), name: "New Zone", collapsed: false,
              x, y, w: ZONE_MIN.w, h: ZONE_MIN.h, color: d.zones.length % ZONE_COLORS.length,
            }],
          };
        });
      };
      const patchZone = (id, patch) => {
        // expanding a collapsed zone re-fits it around its (possibly moved) tasks
        const cardH = patch.collapsed === false ? measureHeights() : null;
        setData((d) => {
          const next = { ...d, zones: d.zones.map((z) => (z.id === id ? { ...z, ...patch } : z)) };
          return cardH ? fitZones(next, cardH) : next;
        });
      };
      const deleteZone = (id) => setData((d) => ({
        ...d,
        zones: d.zones.filter((z) => z.id !== id),
        tasks: d.tasks.map((t) => (t.zoneId === id ? { ...t, zoneId: null } : t)),
      }));
      const beginZoneDrag = (zoneId) => {
        const z = data.zones.find((z) => z.id === zoneId);
        return {
          zoneId, zx: z.x, zy: z.y, zw: z.w, zh: z.h,
          // Only tasks assigned to THIS zone travel with it — a task placed in
          // an overlapping zone stays where its owner is.
          members: data.tasks.filter((t) => !t.completed && memberOf(t, z)).map((t) => ({ id: t.id, x: t.x, y: t.y })),
        };
      };
      const dragZoneTo = (snap, dX, dY) => {
        setData((d) => {
          // zones may never overlap: a dragged zone slides along the edge of
          // any zone it runs into instead of passing through it
          const me = d.zones.find((z) => z.id === snap.zoneId);
          if (!me) return d;
          const effW = me.collapsed ? 360 : snap.zw, effH = me.collapsed ? 110 : snap.zh;
          const others = d.zones.filter((z) => z.id !== snap.zoneId);
          const hits = (x, y) => others.some((z) => {
            const r = { x: z.x, y: z.y, w: z.collapsed ? 360 : z.w, h: z.collapsed ? 110 : z.h };
            return x < r.x + r.w + ZONE_GAP && r.x < x + effW + ZONE_GAP && y < r.y + r.h + ZONE_GAP && r.y < y + effH + ZONE_GAP;
          });
          let nx = clamp(snap.zx + dX, 0, CANVAS.width - snap.zw);
          let ny = clamp(snap.zy + dY, 0, CANVAS.height - snap.zh);
          if (hits(nx, ny)) {
            if (!hits(nx, me.y)) ny = me.y;       // blocked vertically — slide sideways
            else if (!hits(me.x, ny)) nx = me.x;  // blocked horizontally — slide up/down
            else { nx = me.x; ny = me.y; }        // cornered — stay put
          }
          const aX = nx - snap.zx, aY = ny - snap.zy; // the delta that actually applied
          return {
            ...d,
            zones: d.zones.map((z) => (z.id === snap.zoneId ? { ...z, x: nx, y: ny } : z)),
            tasks: d.tasks.map((t) => {
              const m = snap.members.find((m) => m.id === t.id);
              return m ? { ...t, x: clamp(m.x + aX, 0, CANVAS.width - 420), y: clamp(m.y + aY, 0, CANVAS.height - 240) } : t;
            }),
          };
        });
      };

      /* ---- timer ---- */
      const startTimer = (taskId) => setData((d) => ({ ...d, timer: { taskId, endsAt: Date.now() + POMO_MS, paused: false, done: false } }));
      const pauseTimer = () => setData((d) => ({ ...d, timer: { ...d.timer, paused: true, remaining: Math.max(0, d.timer.endsAt - Date.now()) } }));
      const resumeTimer = () => setData((d) => ({ ...d, timer: { ...d.timer, paused: false, endsAt: Date.now() + d.timer.remaining } }));
      const stopTimer = () => setData((d) => ({ ...d, timer: null }));

      /* ---- auto arrange ----
             A compacting tidy-up — everything gathers around the hot center
             while keeping its bearing (what was north-east stays north-east):
             1. Each zone re-packs its cards (loose grid, light jitter),
                growing so nothing bleeds over its edges.
             2. Chains of linked loose tasks re-form left→right by dependency
                depth.
             3. Blocks (zones and chains) slide inward toward the center
                along their own bearing until they'd touch something already
                placed — the board becomes one cluster, without overlaps.
             4. Loose single tasks pull in the same way, settling around the
                blocks.
             5. A repair pass nudges cards out of every link's corridor so no
                arrow cuts through an unrelated card — zone members only ever
                move within their own zone, never out of it.
             Afterwards the camera zooms out just enough to fit the cluster
             and centers on it. ---- */
      const autoArrange = () => {
        // Real rendered card heights — cards vary with content.
        const cardH = {};
        canvasRef.current.querySelectorAll("[data-task-id]").forEach((el) => { cardH[el.dataset.taskId] = el.offsetHeight; });
        const rnd = (a) => (Math.random() * 2 - 1) * a;

        // computed outside the state updater so the camera can fit the
        // finished layout afterwards
        {
          const d = dataRef.current;
          const GAP = 120;      // minimum clearance kept between zone/chain blocks
          const PAD = 50;       // zone edge -> card clearance
          const HEADER = 70;    // room for the zone header strip
          const CARD_GAP = 55;
          const activeT = d.tasks.filter((t) => !t.completed);
          const activeIds = new Set(activeT.map((t) => t.id));
          const links = d.links.filter((l) => activeIds.has(l.from) && activeIds.has(l.to));
          const byId = Object.fromEntries(activeT.map((t) => [t.id, t]));
          const hOf = (t) => cardH[t.id] || 220;
          const target = {}, zonePatch = {};

          // --- 1. zone blocks: inner grid with jitter, zone grows to fit ---
          const zoneBlocks = d.zones.map((z) => {
            const m = activeT.filter((t) => memberOf(t, z));
            // linked members sort by dependency depth so prerequisite sits
            // right before dependent — short arrows that skim no one
            const mIds = new Set(m.map((t) => t.id));
            const zl = links.filter((l) => mIds.has(l.from) && mIds.has(l.to));
            const dep = {};
            m.forEach((t) => (dep[t.id] = 0));
            for (let i = 0; i < m.length; i++) {
              let ch = false;
              zl.forEach((l) => { if (dep[l.to] < dep[l.from] + 1) { dep[l.to] = dep[l.from] + 1; ch = true; } });
              if (!ch) break;
            }
            m.sort((a, b) => dep[a.id] - dep[b.id] || priOf(a).rank - priOf(b).rank || a.createdAt - b.createdAt);
            if (z.collapsed) return { kind: "zone", z, m, w: 360, h: 110, collapsed: true };
            // width scales with the task count (≈ square packing) — zone sizes
            // are derived from their contents, never from a stored user size
            const maxW = Math.max(0, ...m.map((t) => priOf(t).width));
            const cols = Math.max(1, Math.ceil(Math.sqrt(m.length)));
            const w = Math.max(ZONE_MIN.w, cols * (maxW + CARD_GAP) - CARD_GAP + PAD * 2);
            let cx = PAD, cy = HEADER, rowH = 0, bottom = HEADER;
            const rel = m.map((t) => {
              const cw = priOf(t).width, ch = hOf(t);
              if (cx > PAD && cx + cw > w - PAD) { cx = PAD; cy += rowH + CARD_GAP; rowH = 0; }
              const r = { id: t.id, dx: cx + rnd(18), dy: cy + rnd(18) };
              bottom = Math.max(bottom, r.dy + ch);
              cx += cw + CARD_GAP;
              rowH = Math.max(rowH, ch);
              return r;
            });
            const h = m.length ? Math.max(ZONE_MIN.h, bottom + PAD) : ZONE_MIN.h;
            return { kind: "zone", z, m, w, h, rel };
          });

          // --- 2. linked loose tasks → left-to-right dependency chains ---
          const inZone = new Set(zoneBlocks.flatMap((b) => b.m.map((t) => t.id)));
          const loose = activeT.filter((t) => !inZone.has(t.id));
          const looseIds = new Set(loose.map((t) => t.id));
          const looseLinks = links.filter((l) => looseIds.has(l.from) && looseIds.has(l.to));
          const compOf = {};
          loose.forEach((t) => (compOf[t.id] = t.id));
          const find = (x) => (compOf[x] === x ? x : (compOf[x] = find(compOf[x])));
          looseLinks.forEach((l) => { compOf[find(l.from)] = find(l.to); });
          const comps = {};
          loose.forEach((t) => { const r = find(t.id); (comps[r] = comps[r] || []).push(t); });

          const chainBlocks = [], singles = [];
          Object.values(comps).forEach((m) => {
            if (m.length < 2) { singles.push(m[0]); return; }
            // dependency depth = longest prerequisite path (capped, so a
            // cyclic link chain can't loop forever)
            const inComp = new Set(m.map((t) => t.id));
            const cl = looseLinks.filter((l) => inComp.has(l.from) && inComp.has(l.to));
            const depth = {};
            m.forEach((t) => (depth[t.id] = 0));
            for (let i = 0; i < m.length; i++) {
              let changed = false;
              cl.forEach((l) => { if (depth[l.to] < depth[l.from] + 1) { depth[l.to] = depth[l.from] + 1; changed = true; } });
              if (!changed) break;
            }
            const levels = [...new Set(m.map((t) => depth[t.id]))].sort((a, b) => a - b);
            const cols = levels.map((lv) => m.filter((t) => depth[t.id] === lv));
            // order each column by where its prerequisites sit → fewer crossings
            cols.forEach((col, ci) => {
              if (!ci) { col.sort((a, b) => priOf(a).rank - priOf(b).rank); return; }
              const prev = {};
              cols[ci - 1].forEach((t, i) => (prev[t.id] = i));
              const bary = (t) => {
                const ps = cl.filter((l) => l.to === t.id).map((l) => prev[l.from]).filter((v) => v !== undefined);
                return ps.length ? ps.reduce((s, v) => s + v, 0) / ps.length : 99;
              };
              col.sort((a, b) => bary(a) - bary(b));
            });
            const COL_GAP = 300, ROW_GAP = 130;
            const colW = cols.map((col) => Math.max(...col.map((t) => priOf(t).width)));
            const colH = cols.map((col) => col.reduce((s, t) => s + hOf(t), 0) + ROW_GAP * (col.length - 1));
            const blockH = Math.max(...colH);
            let x = 0;
            const rel = [];
            cols.forEach((col, ci) => {
              let y = (blockH - colH[ci]) / 2;
              col.forEach((t) => {
                rel.push({ id: t.id, dx: x + rnd(35), dy: y + rnd(35) });
                y += hOf(t) + ROW_GAP;
              });
              x += colW[ci] + COL_GAP;
            });
            chainBlocks.push({ kind: "chain", m, w: x - COL_GAP, h: blockH, rel });
          });

          // --- 3. compact: blocks slide in toward the hot center ---
          // Every block keeps its bearing from the center but pulls inward
          // as far as it can without touching anything already placed —
          // arranging gathers the whole board into one cluster around the
          // hot zone. Closest blocks go first and claim the inner spots.
          const blocks = [...zoneBlocks, ...chainBlocks];
          blocks.forEach((b) => {
            const ax = b.kind === "zone" ? b.z.x + b.w / 2 : b.m.reduce((s, t) => s + t.x, 0) / b.m.length;
            const ay = b.kind === "zone" ? b.z.y + b.h / 2 : b.m.reduce((s, t) => s + t.y, 0) / b.m.length;
            b.dist = Math.hypot(ax - CENTER.x, ay - CENTER.y);
            b.angle = b.dist < 1 ? Math.random() * 2 * Math.PI : Math.atan2(ay - CENTER.y, ax - CENTER.x);
          });
          blocks.sort((a, b) => a.dist - b.dist);
          const placed = []; // {x, y, w, h} of settled blocks
          const blockCollides = (x, y, w, h) =>
            placed.some((p) => x < p.x + p.w + GAP && p.x < x + w + GAP && y < p.y + p.h + GAP && p.y < y + h + GAP);
          blocks.forEach((b) => {
            let bx = clamp(CENTER.x - b.w / 2, 0, CANVAS.width - b.w);
            let by = clamp(CENTER.y - b.h / 2, 0, CANVAS.height - b.h);
            for (let r = 0; r < 14000; r += 40) {
              bx = clamp(CENTER.x + Math.cos(b.angle) * r - b.w / 2, 0, CANVAS.width - b.w);
              by = clamp(CENTER.y + Math.sin(b.angle) * r - b.h / 2, 0, CANVAS.height - b.h);
              if (!blockCollides(bx, by, b.w, b.h)) break;
            }
            placed.push({ x: bx, y: by, w: b.w, h: b.h });
            if (b.kind === "zone") {
              zonePatch[b.z.id] = b.collapsed ? { x: bx, y: by } : { x: bx, y: by, w: b.w, h: b.h };
              if (b.rel) {
                b.rel.forEach((rp) => { target[rp.id] = { x: clamp(bx + rp.dx, 0, CANVAS.width - 420), y: clamp(by + rp.dy, 0, CANVAS.height - 240) }; });
              } else {
                // collapsed zone: members stay hidden — shift them with the box
                b.m.forEach((t) => { target[t.id] = { x: clamp(t.x + bx - b.z.x, 0, CANVAS.width - 420), y: clamp(t.y + by - b.z.y, 0, CANVAS.height - 240) }; });
              }
            } else {
              b.rel.forEach((rp) => { target[rp.id] = { x: clamp(bx + rp.dx, 0, CANVAS.width - 420), y: clamp(by + rp.dy, 0, CANVAS.height - 240) }; });
            }
          });

          // --- 4. loose singles pull in the same way, around the blocks ---
          const solids = placed.map((p) => ({ ...p }));
          const SPACE = 60; // personal space around every loose card
          singles
            .map((t) => {
              const dist = Math.hypot(t.x - CENTER.x, t.y - CENTER.y);
              return { t, dist, angle: dist < 1 ? Math.random() * 2 * Math.PI : Math.atan2(t.y - CENTER.y, t.x - CENTER.x) };
            })
            .sort((a, b) => a.dist - b.dist)
            .forEach(({ t, angle }) => {
              const w = priOf(t).width, h = hOf(t);
              let x = t.x, y = t.y;
              for (let r = 0; r < 14000; r += 35) {
                x = clamp(CENTER.x + Math.cos(angle) * r - w / 2, 0, CANVAS.width - 420);
                y = clamp(CENTER.y + Math.sin(angle) * r - h / 2, 0, CANVAS.height - 240);
                if (!solids.some((p) => x < p.x + p.w + SPACE && p.x < x + w + SPACE && y < p.y + p.h + SPACE && p.y < y + h + SPACE)) break;
              }
              target[t.id] = { x, y };
              solids.push({ x, y, w, h });
            });

          // --- 5. repair pass: keep arrows out of unrelated cards ---
          // Every violation is fixed by RELOCATING the obstructing card to a
          // freshly sampled spot that is provably clear: spaced from every
          // card, outside every corridor, and with its own links' corridors
          // (from the new spot) crossing no one. A successful relocation can
          // never create a new violation, so each round shrinks the
          // violation set. One hard rule trumps arrow purity: a zone member
          // is only ever moved WITHIN its zone — if no clear in-zone spot
          // exists, the card stays and the arrow may pass over it.
          const hiddenIn = new Set(zoneBlocks.filter((b) => b.collapsed).flatMap((b) => b.m.map((t) => t.id)));
          const zoneOfMember = {}; // membership as packed above, not raw zoneId
          zoneBlocks.forEach((b) => b.m.forEach((t) => { zoneOfMember[t.id] = b.z; }));
          const visible = activeT.filter((t) => !hiddenIn.has(t.id));
          const visLinks = links.filter((l) => !hiddenIn.has(l.from) && !hiddenIn.has(l.to));
          const posOf = (id) => target[id] || { x: byId[id].x, y: byId[id].y };
          const rectOf = (id) => { const p = posOf(id); return { x: p.x, y: p.y, w: priOf(byId[id]).width, h: hOf(byId[id]) }; };
          const midOf = (id) => { const r = rectOf(id); return { x: r.x + r.w / 2, y: r.y + r.h / 2 }; };
          const zoneRectOf = (z) => {
            const p = zonePatch[z.id] || z;
            return {
              x: p.x, y: p.y,
              w: p.w !== undefined ? p.w : (z.collapsed ? 360 : z.w),
              h: p.h !== undefined ? p.h : (z.collapsed ? 110 : z.h),
            };
          };
          const PADC = 55; // corridor padding — covers the curve bow generously
          const segHitsPadded = (ax, ay, bx, by, r) =>
            segHitsRect(ax, ay, bx, by, { x: r.x - PADC, y: r.y - PADC, w: r.w + PADC * 2, h: r.h + PADC * 2 });
          const corridorHits = (l, rect) => {
            const a = midOf(l.from), b = midOf(l.to);
            return segHitsPadded(a.x, a.y, b.x, b.y, rect);
          };
          const violations = () => {
            const bad = new Set();
            visLinks.forEach((l) => {
              visible.forEach((t) => {
                if (t.id === l.from || t.id === l.to) return;
                if (corridorHits(l, rectOf(t.id))) bad.add(t.id);
              });
            });
            return [...bad];
          };
          const okSpot = (id, x, y, insideZone) => {
            const w = priOf(byId[id]).width, h = hOf(byId[id]);
            // spaced from every visible card
            for (const t of visible) {
              if (t.id === id) continue;
              const r = rectOf(t.id);
              if (x < r.x + r.w + 40 && r.x < x + w + 40 && y < r.y + r.h + 40 && r.y < y + h + 40) return false;
            }
            // loose cards also stay off zone boxes
            if (!insideZone) {
              for (const z of d.zones) {
                const r = zoneRectOf(z);
                if (x < r.x + r.w + 60 && r.x < x + w + 60 && y < r.y + r.h + 60 && r.y < y + h + 60) return false;
              }
            }
            // no existing corridor may cross the candidate spot
            const cand = { x, y, w, h };
            for (const l of visLinks) {
              if (l.from === id || l.to === id) continue;
              if (corridorHits(l, cand)) return false;
            }
            // ...and the card's own corridors, from here, must cross no one
            for (const l of visLinks) {
              if (l.from !== id && l.to !== id) continue;
              const o = midOf(l.from === id ? l.to : l.from);
              for (const t of visible) {
                if (t.id === id || t.id === l.from || t.id === l.to) continue;
                if (segHitsPadded(x + w / 2, y + h / 2, o.x, o.y, rectOf(t.id))) return false;
              }
            }
            return true;
          };
          const relocate = (id) => {
            const t = byId[id];
            const w = priOf(t).width, h = hOf(t);
            const home = zoneOfMember[id] || null;
            if (home && !home.collapsed) {
              // try to stay inside the home zone, stretching it a bit if cramped
              // (growth stays under the block gap, so zones still can't touch)
              for (let grow = 0; grow < 3; grow++) {
                const zr = zoneRectOf(home);
                for (let att = 0; att < 90; att++) {
                  const x = zr.x + PAD + Math.random() * Math.max(1, zr.w - w - PAD * 2);
                  const y = zr.y + HEADER + Math.random() * Math.max(1, zr.h - h - HEADER - PAD);
                  if (okSpot(id, x, y, true)) { target[id] = { x, y }; return true; }
                }
                if (grow < 2) {
                  // total growth stays under the block gap, so zones can't
                  // be grown into each other
                  const zr2 = zoneRectOf(home);
                  zonePatch[home.id] = { x: zr2.x, y: zr2.y, w: zr2.w, h: zr2.h + 50 };
                }
              }
              // no clear in-zone spot — the member stays where it is rather
              // than being thrown out of its zone
              return false;
            }
            // open space NEAR the card: widening rings around its own spot,
            // so a repair never flings a card across the map
            const p0 = posOf(id);
            for (let base = 150; base < 8000; base += 350) {
              for (let att = 0; att < 60; att++) {
                const rr = base + Math.random() * 350, aa = Math.random() * 2 * Math.PI;
                const x = clamp(p0.x + rr * Math.cos(aa), 0, CANVAS.width - 420);
                const y = clamp(p0.y + rr * Math.sin(aa) * 0.85, 0, CANVAS.height - 240);
                if (okSpot(id, x, y, false)) { target[id] = { x, y }; return true; }
              }
            }
            return false;
          };
          const stuck = new Set(); // unfixable — tolerate their violations
          for (let round = 0; round < 20; round++) {
            const bad = violations().filter((id) => !stuck.has(id));
            if (!bad.length) break;
            bad.forEach((id) => { if (!relocate(id)) stuck.add(id); });
          }

          const zonesNext = d.zones.map((z) => (zonePatch[z.id] ? { ...z, ...zonePatch[z.id] } : z));
          // Re-sync membership to where cards actually landed — the corridor
          // repair pass may have pushed one out of its zone, and a stale
          // zoneId would make the auto-fit stretch the zone across the map.
          const tasksNext = d.tasks.map((t) => {
            const moved = target[t.id] ? { ...t, ...target[t.id] } : t;
            return moved.completed ? moved : { ...moved, zoneId: zoneIdAt(moved, zonesNext) };
          });
          setData({ ...d, zones: zonesNext, tasks: tasksNext });

          // camera: zoom out just enough (never past 100%) to fit the whole
          // cluster, and center on it
          let bx1 = Infinity, by1 = Infinity, bx2 = -Infinity, by2 = -Infinity;
          tasksNext.forEach((t) => {
            if (t.completed || hiddenIn.has(t.id)) return;
            bx1 = Math.min(bx1, t.x); by1 = Math.min(by1, t.y);
            bx2 = Math.max(bx2, t.x + priOf(t).width); by2 = Math.max(by2, t.y + (cardH[t.id] || 220));
          });
          zonesNext.forEach((z) => {
            const w = z.collapsed ? 360 : z.w, h = z.collapsed ? 110 : z.h;
            bx1 = Math.min(bx1, z.x); by1 = Math.min(by1, z.y);
            bx2 = Math.max(bx2, z.x + w); by2 = Math.max(by2, z.y + h);
          });
          if (bx2 > bx1) {
            const vp = viewportRef.current;
            const PADV = 160; // canvas-space breathing room around the cluster
            const zFit = Math.min(vp.clientWidth / (bx2 - bx1 + PADV * 2), vp.clientHeight / (by2 - by1 + PADV * 2), ZOOM_INIT);
            flyTo((bx1 + bx2) / 2, (by1 + by2) / 2, zFit);
          }
        }
      };

      /* ---- hotkeys: N new task · L link · Z zone · A arrange ---- */
      // The handlers close over fresh state each render; the ref lets a
      // once-registered listener always call the latest ones.
      const mouse = useRef(null); // last cursor position — Z drops the zone there
      const hotkeys = useRef({});
      hotkeys.current = {
        addZone, autoArrange,
        canLink: active.length >= 2, canArrange: active.length > 0, busy: !!modal,
        cursorPoint: () => {
          if (!mouse.current) return undefined;
          const r = canvasRef.current.getBoundingClientRect();
          return { x: (mouse.current.x - r.left) / zoom, y: (mouse.current.y - r.top) / zoom };
        },
      };
      useEffect(() => {
        const onMove = (e) => { mouse.current = { x: e.clientX, y: e.clientY }; };
        window.addEventListener("pointermove", onMove);
        return () => window.removeEventListener("pointermove", onMove);
      }, []);
      useEffect(() => {
        const onKey = (e) => {
          if (e.ctrlKey || e.metaKey || e.altKey) return;
          if (e.target.closest("input, textarea, select, [contenteditable]")) return;
          const h = hotkeys.current;
          if (h.busy) return;
          const k = e.key.toLowerCase();
          if (k === "n" || k === "t") { e.preventDefault(); setModal({}); }
          else if (k === "l") { if (h.canLink) { e.preventDefault(); setLinkStep((s) => (s ? null : "from")); } }
          else if (k === "z") { e.preventDefault(); h.addZone(h.cursorPoint()); }
          else if (k === "a") { if (h.canArrange) { e.preventDefault(); h.autoArrange(); } }
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, []);

      /* ---- render ---- */
      const HeaderBtn = ({ onClick, active: isActive, disabled, children, title }) => (
        <button
          onClick={onClick} disabled={disabled} title={title}
          className={`px-3 py-1.5 text-[13px] font-medium rounded-full transition-colors disabled:opacity-40 ${
            isActive ? "bg-blue-50 text-blue-600 dark:bg-blue-500/15 dark:text-blue-300" : "text-gray-500 hover:bg-gray-100 dark:text-slate-400 dark:hover:bg-slate-800"
          }`}
        >
          {children}
        </button>
      );

      return (
        <div className="h-screen flex flex-col">
          {/* ---------- Header (glass) ---------- */}
          <header className="z-[96] flex items-center gap-1.5 px-4 py-2.5 border-b border-gray-200/70 dark:border-slate-800 bg-white/70 dark:bg-slate-950/70 backdrop-blur-md flex-wrap">
            <h1 className="font-bold text-[15px] tracking-tight mr-1 text-gray-900 dark:text-slate-100">entropy</h1>
            <SyncMenu drive={drive} />

            <div className="hidden md:flex items-center gap-1.5 text-[11px]">
              {Object.entries(PRIORITIES).map(([key, p]) => (
                <span key={key} className={`inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-full font-medium ${p.badge}`}>
                  <span className={`w-1.5 h-1.5 rounded-full ${p.dot}`}></span>
                  {counts[key]}
                </span>
              ))}
              {totalH > 0 && (
                <span className="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full bg-gray-100 text-gray-500 dark:bg-slate-800 dark:text-slate-400 font-medium" title="Total estimated work on the map">
                  {fmtH(totalH)}h
                </span>
              )}
            </div>

            <div className="flex-1"></div>

            <HeaderBtn onClick={() => setLinkStep(linkStep ? null : "from")} active={!!linkStep} disabled={active.length < 2} title="Link two tasks as a dependency (L)">Link</HeaderBtn>
            <HeaderBtn onClick={() => addZone()} title="Add a grouping zone to the map (Z drops one at the cursor)">Zone</HeaderBtn>
            <HeaderBtn onClick={() => setFocusMode((v) => !v)} active={focusMode} title="Dim everything except critical tasks and the active focus session">Focus</HeaderBtn>
            <HeaderBtn onClick={autoArrange} disabled={active.length === 0} title="Tidy up: pull everything into one cluster around the center, keeping relative positions, then zoom to fit (A)">Arrange</HeaderBtn>
            <HeaderBtn onClick={() => { setShowStats((v) => !v); }} active={showStats} title="Daily velocity and workload stats">Stats</HeaderBtn>
            <HeaderBtn onClick={() => setShowDone((v) => !v)} active={showDone} title="Completed tasks">✓ {done.length}</HeaderBtn>
            <HeaderBtn onClick={() => setDark((v) => !v)} title={dark ? "Switch to light mode" : "Switch to dark mode"}>{dark ? "☀️" : "🌙"}</HeaderBtn>
            <button onClick={() => setModal({})} title="Add a task (N)" className="ml-1 px-4 py-1.5 text-[13px] font-semibold rounded-full bg-blue-500 text-white hover:bg-blue-600 transition-colors shadow-sm">+ New Task</button>
          </header>

          {/* ---------- Link-mode banner ---------- */}
          {linkStep && (
            <div className="z-[96] flex items-center justify-center gap-3 px-4 py-1.5 bg-blue-50/90 dark:bg-blue-950/80 backdrop-blur border-b border-blue-100 dark:border-blue-900 text-[12px] text-blue-600 dark:text-blue-300">
              {linkStep === "from"
                ? <span>Click the task that must be finished <b>first</b>…</span>
                : <span>Now click the task that <b>depends on it</b> (the arrow will point to it)</span>}
              <button onClick={() => setLinkStep(null)} className="px-2.5 py-0.5 rounded-full bg-white/70 hover:bg-white dark:bg-slate-800/70 dark:hover:bg-slate-800 transition-colors">Cancel (Esc)</button>
            </div>
          )}

          {/* ---------- Map ---------- */}
          <div
            ref={viewportRef}
            className={`map-viewport flex-1 overflow-auto flex ${panning ? "cursor-grabbing" : ""}`}
            onPointerDown={panDown} onPointerMove={panMove} onPointerUp={panEnd} onPointerCancel={panEnd}
            onContextMenu={(e) => { if (panMoved.current) { e.preventDefault(); panMoved.current = false; } }}
          >
            {/* Sizer div gives the viewport the scaled scroll extents; auto
                margins center the map when it's smaller than the viewport. */}
            <div style={{ width: CANVAS.width * zoom, height: CANVAS.height * zoom, overflow: "hidden", margin: "auto", flexShrink: 0 }}>
            <div ref={canvasRef} className={`map-grid relative ${zoneDragging ? "zone-dragging" : ""}`} style={{ width: CANVAS.width, height: CANVAS.height, transform: `scale(${zoom})`, transformOrigin: "0 0" }}>
              {data.zones.map((z) => {
                const members = active.filter((t) => memberOf(t, z));
                const avg = members.length ? members.reduce((s, t) => s + priOf(t).rank, 0) / members.length : null;
                return (
                <Zone
                  key={z.id} zone={z} zoom={zoom}
                  count={members.length}
                  priority={avg === null ? null : ["critical", "high", "medium", "low"][clamp(Math.round(avg), 0, 3)]}
                  onPatch={patchZone} onDelete={deleteZone}
                  onAddTask={(zid) => setModal({ zoneId: zid })}
                  beginDrag={beginZoneDrag} onDragTo={dragZoneTo}
                  onDragState={setZoneDragging}
                />
                );
              })}

              <LinksLayer links={data.links} tasks={data.tasks} hiddenIds={hiddenIds} onDeleteLink={deleteLink} />

              {active.length === 0 && (
                <div className="absolute text-center select-none pointer-events-none" style={{ left: CANVAS.width / 2, top: CANVAS.height / 2 - 60, transform: "translate(-50%, -50%)" }}>
                  <p className="text-2xl text-gray-400 dark:text-slate-500">Your map is empty.</p>
                  <p className="text-xl mt-2 text-gray-400 dark:text-slate-500">Hit <span className="text-blue-500 dark:text-blue-400 font-medium">+ New Task</span> to drop your first task on the map.</p>
                </div>
              )}

              {active.filter((t) => !hiddenIds.has(t.id)).map((task) => (
                <TaskCard
                  key={task.id} task={task} canvasRef={canvasRef} zoom={zoom} now={now}
                  blocked={blockedIds.has(task.id)}
                  dimmed={focusIds ? !focusIds.has(task.id) : false}
                  linkMode={!!linkStep} linkSource={linkStep !== "from" ? linkStep : null}
                  onMove={moveTask} onDrop={dropTask} onUpdate={updateTask}
                  onEdit={(t) => setModal({ task: t })}
                  onComplete={completeTask} onDelete={deleteTask}
                  onStartTimer={startTimer} onPick={pickForLink}
                />
              ))}
            </div>
            </div>
          </div>

          {/* ---------- Minimap ---------- */}
          <MiniMap zones={data.zones} tasks={active} view={viewRect} onJump={jumpTo} />

          {/* ---------- Zoom controls ---------- */}
          <div className="fixed bottom-4 right-4 z-[95] flex items-center gap-0.5 rounded-full bg-white/80 dark:bg-slate-900/85 backdrop-blur-md shadow-lg px-1.5 py-1 select-none">
            <button
              onClick={() => applyZoom((p) => p / ZOOM_STEP)} disabled={zoom <= ZOOM_MIN + 0.0001}
              title="Zoom out (scroll down, or Ctrl −)"
              className="w-7 h-7 rounded-full text-[15px] leading-none text-gray-500 hover:bg-gray-100 dark:text-slate-400 dark:hover:bg-slate-800 disabled:opacity-30 transition-colors"
            >−</button>
            <button
              onClick={() => applyZoom(() => ZOOM_INIT)}
              title="Reset zoom to 100% (Ctrl 0)"
              className="min-w-[44px] px-1 py-1 text-[11px] font-medium tabular-nums rounded-full text-gray-500 hover:bg-gray-100 dark:text-slate-400 dark:hover:bg-slate-800 transition-colors"
            >{Math.round((zoom / ZOOM_INIT) * 100)}%</button>
            <button
              onClick={() => applyZoom((p) => p * ZOOM_STEP)} disabled={zoom >= ZOOM_MAX}
              title="Zoom in (scroll up, or Ctrl +)"
              className="w-7 h-7 rounded-full text-[15px] leading-none text-gray-500 hover:bg-gray-100 dark:text-slate-400 dark:hover:bg-slate-800 disabled:opacity-30 transition-colors"
            >+</button>
          </div>

          {/* ---------- Overlays ---------- */}
          {modal && (
            <TaskModal
              initial={modal.task || null}
              zoneName={modal.zoneId ? (data.zones.find((z) => z.id === modal.zoneId)?.name || null) : null}
              onSave={(fields) => {
                if (modal.task) updateTask(modal.task.id, (t) => ({ ...t, ...fields }));
                else addTask(fields, modal.zoneId);
                setModal(null);
              }}
              onClose={() => setModal(null)}
            />
          )}
          {showDone && <DonePanel tasks={done} onRestore={restoreTask} onDelete={deleteTask} onClearAll={clearDone} onClose={() => setShowDone(false)} />}
          {showStats && <StatsPanel data={data} active={active} onClose={() => setShowStats(false)} />}
          <PomodoroWidget
            timer={data.timer} taskTitle={timerTask?.title || "(task removed)"} now={now}
            onPause={pauseTimer} onResume={resumeTimer} onStop={stopTimer}
            onRestart={() => timerTask && startTimer(timerTask.id)}
          />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
